<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#22c55e"/>
    </marker>
    <linearGradient id="panel" x1="64" y1="122" x2="1216" y2="656" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101720"/>
      <stop offset="1" stop-color="#0A0F16"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      .title { fill: #f8fafc; font-size: 38px; font-weight: 780; }
      .subtitle { fill: #a7b0bf; font-size: 20px; font-weight: 560; }
      .card-title { fill: #f8fafc; font-size: 25px; font-weight: 780; }
      .step { fill: #7dd3fc; font-size: 15px; font-weight: 780; }
      .ready { fill: #22c55e; font-size: 15px; font-weight: 780; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#080C12"/>
  <path d="M64 96H1216" stroke="#1C2633"/>
  <text x="64" y="60" class="title">Autolaunch + Dependencies</text>
  <text x="64" y="88" class="subtitle">Startup and manual launches use the same order.</text>

  <rect x="64" y="122" width="1152" height="534" rx="14" fill="url(#panel)" stroke="#1E2937"/>

  <g filter="url(#shadow)">
    <rect x="118" y="230" width="228" height="96" rx="12" fill="#121A24" stroke="#273446"/>
    <text x="146" y="266" class="step">Startup</text>
    <text x="146" y="300" class="card-title">Autolaunch</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="118" y="430" width="228" height="96" rx="12" fill="#121A24" stroke="#273446"/>
    <text x="146" y="466" class="step">Manual</text>
    <text x="146" y="500" class="card-title">Launch</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="506" y="324" width="264" height="108" rx="14" fill="#0F1620" stroke="#284156"/>
    <text x="548" y="362" class="step">Same rules</text>
    <text x="548" y="398" class="card-title">Dependencies</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="920" y="232" width="214" height="96" rx="12" fill="#102018" stroke="#2F5B3A"/>
    <text x="948" y="268" class="ready">First</text>
    <text x="948" y="302" class="card-title">Required apps</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="920" y="432" width="214" height="96" rx="12" fill="#121A24" stroke="#273446"/>
    <text x="948" y="468" class="step">Then</text>
    <text x="948" y="502" class="card-title">Selected apps</text>
  </g>

  <path d="M366 278C432 278 438 350 484 364" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M366 478C432 478 438 406 484 392" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M790 378C842 378 850 298 898 286" stroke="#22c55e" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <path d="M1027 344V410" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
</svg>
